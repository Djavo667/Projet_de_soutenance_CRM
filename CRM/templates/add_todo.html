{% extends "base.html" %}
{% block title %} Ajouter une tâche {% endblock %}

{% block content %}
    <h1>Ajouter une tâche à la to-do list</h1>
    <form method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Enregistrer</button>
    </form>
    <a href="/todo/">Retour à la to-do list</a><br>
    <a href="/">Retour à l'accueil</a>
{% endblock %}
